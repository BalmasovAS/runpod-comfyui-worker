# Extra Model Paths for Wan Video
# This configuration allows ComfyUI to find models in custom locations
# Format: each model type should be a string value, not a nested dict

a1:
  base_path: /runpod-volume
  checkpoints: diffusion_models
  loras: loras
  vae: vae
  clip: text_encoders
  embeddings: embeddings
  diffusion_models: diffusion_models
  controlnet: controlnet
  upscale_models: upscale_models
  unet: unet

# Also check ComfyUI/models structure if it exists
a2:
  base_path: /runpod-volume/ComfyUI/models
  checkpoints: checkpoints
  loras: loras
  vae: vae
  clip: clip
  embeddings: embeddings
  controlnet: controlnet
  upscale_models: upscale_models
  unet: unet
